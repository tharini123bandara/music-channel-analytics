name: Daily Data Refresh

# Runs automatically every day at 06:00 UTC, and can also be triggered
# manually from the GitHub Actions tab for testing.
on:
  schedule:
    - cron: "5 11 * * *"
  workflow_dispatch:

# Grant write access so this workflow can push its data-refresh commit
# back to the repo. By default GITHUB_TOKEN is read-only.
permissions:
  contents: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest YouTube data
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python fetch_data.py

      - name: Rebuild database
        run: python build_database.py

      - name: Classify video content types
        run: python classify_content.py

      - name: Commit and push updated data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ music_analytics.db
          git diff --staged --quiet || git commit -m "Automated daily data refresh"
          git pull --rebase origin main
          git push